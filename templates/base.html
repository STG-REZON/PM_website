{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pascal Medical{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Основные CSS -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}?v=20260605-services-title-spacing">
    
    <!-- Дополнительные CSS -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'includes/header.html' %}
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    {% include 'includes/footer.html' %}
    
    <!-- Основной JS -->
    <script src="{% static 'js/main.js' %}?v=20260604-analytics-events"></script>
    
    <!-- Дополнительный JS -->
    {% block extra_js %}{% endblock %}
    
    <!-- Toast notification -->
    <div class="toast" id="toast">Номер скопирован!</div>
    
    <!-- Чат-ассистент -->
    {% include 'assistant/widget.html' %}
</body>
</html>

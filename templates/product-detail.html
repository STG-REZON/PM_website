{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продукт - Pascal Medical</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/products.css' %}">
</head>
<body>
    <!-- HEADER -->
    {% include 'includes/header.html' %}

    <div class="toast" id="toast">Номер скопирован!</div>

    <!-- BREADCRUMBS -->
    <div class="breadcrumbs-wrapper">
        <div class="container">
            <nav class="breadcrumbs">
                <a href="{% url 'home' %}" class="breadcrumb-item">Главная</a>
                <span class="breadcrumb-separator">/</span>
                <a href="{% url 'home' %}#products" class="breadcrumb-item">Продукция</a>
                <span class="breadcrumb-separator">/</span>
                <a href="#" class="breadcrumb-item" id="breadcrumbCategory"></a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item active" id="breadcrumbProduct"></span>
            </nav>
        </div>
    </div>

    <section class="product-detail-section">
        <div class="container">
            <h1 class="product-detail-title" id="productTitle"></h1>

            <div class="product-detail-wrapper">
                <div class="product-image-container">
                    <img src="" alt="Продукт" id="productImage" class="product-detail-image">
                </div>

                <div class="product-info-panel">
                    <div class="characteristics">
                        <h3 class="characteristics-title">Характеристики</h3>
                        <div class="characteristics-grid" id="characteristics"></div>
                    </div>
                </div>
            </div>

            <div class="product-description-section">
                <h3 class="description-title">Описание</h3>
                <p class="description-text" id="descriptionText"></p>
            </div>
        </div>
    </section>

    {% include 'includes/footer.html' %}

    <script src="{% static 'js/product-detail.js' %}"></script>
</body>
</html>

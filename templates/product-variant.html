{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продукт - Pascal Medical</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/products.css' %}">
</head>
<body>
    {% include 'includes/header.html' %}

    <div class="toast" id="toast">Номер скопирован!</div>

    <div class="breadcrumbs-wrapper">
        <div class="container">
            <nav class="breadcrumbs">
                <a href="{% url 'home' %}" class="breadcrumb-item">Главная</a>
                <span class="breadcrumb-separator">/</span>
                <a href="{% url 'home' %}#products" class="breadcrumb-item">Продукция</a>
                <span class="breadcrumb-separator">/</span>
                <a href="#" class="breadcrumb-item" id="breadcrumb-category"></a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item active" id="breadcrumb-product"></span>
            </nav>
        </div>
    </div>

    <section class="product-variant-section">
        <div class="container">
            <div class="variant-grid">
                <div class="variant-image">
                    <img src="" alt="" id="variantImage">
                </div>
                <div class="variant-info">
                    <h1 class="variant-title" id="variantTitle"></h1>
                    <p class="variant-description" id="variantDescription"></p>
                </div>
            </div>
        </div>
    </section>

    {% include 'includes/footer.html' %}

    <script src="{% static 'js/product-variant.js' %}"></script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Категория - Pascal Medical</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/products.css' %}">
</head>
<body>
    <!-- HEADER -->
    {% include 'includes/header.html' %}

    <div class="toast" id="toast">Номер скопирован!</div>

    <!-- BREADCRUMBS -->
    <div class="breadcrumbs-wrapper">
        <div class="container">
            <nav class="breadcrumbs">
                <a href="{% url 'home' %}" class="breadcrumb-item">Главная</a>
                <span class="breadcrumb-separator">/</span>
                <a href="{% url 'home' %}#products" class="breadcrumb-item">Продукция</a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item active" id="breadcrumbCategory"></span>
            </nav>
        </div>
    </div>

    <!-- CATEGORY PAGE -->
    <section class="category-section">
        <div class="container">
            <h1 class="category-title" id="categoryTitle"></h1>
            <div class="products-grid-15" id="productsGrid"></div>
        </div>
    </section>

    <!-- FOOTER -->
    {% include 'includes/footer.html' %}

    <script src="{% static 'js/product-category.js' %}"></script>
</body>
</html>

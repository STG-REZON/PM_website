{% load static %}
<!-- Chat Widget CSS -->
<style>
.chat-widget {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.chat-button {
    width: 65px;
    height: 65px;
    background: linear-gradient(135deg, #4DA5A3, #5B3A99);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(91, 58, 153, 0.4);
    transition: all 0.3s ease;
    border: none;
}

.chat-button:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 30px rgba(77, 165, 163, 0.5);
}

.chat-button svg {
    width: 35px;
    height: 35px;
    fill: white;
}

.chat-window {
    position: fixed;
    bottom: 110px;
    right: 30px;
    width: 380px;
    height: 550px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    display: none;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp 0.3s ease;
}

.chat-window.open {
    display: flex;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.chat-header {
    background: linear-gradient(135deg, #4DA5A3, #5B3A99);
    color: white;
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-header h4 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
}

.chat-header h4 small {
    font-size: 12px;
    font-weight: 400;
    opacity: 0.8;
}

.chat-close {
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f5f7fa;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
}

.message.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #4DA5A3, #5B3A99);
    color: white;
    border-bottom-right-radius: 4px;
}

.message.bot {
    align-self: flex-start;
    background: white;
    color: #333;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
}

.message.bot strong {
    color: #5B3A99;
}

.quick-questions {
    padding: 12px 15px;
    background: white;
    border-top: 1px solid #eee;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.quick-btn {
    background: #f0f0f0;
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #5B3A99;
    font-weight: 500;
}

.quick-btn:hover {
    background: #4DA5A3;
    color: white;
}

.chat-input-area {
    display: flex;
    padding: 15px;
    background: white;
    border-top: 1px solid #eee;
    gap: 10px;
}

.chat-input {
    flex: 1;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 25px;
    outline: none;
    font-size: 14px;
    transition: border-color 0.3s;
    font-family: inherit;
}

.chat-input:focus {
    border-color: #4DA5A3;
}

.chat-send {
    background: linear-gradient(135deg, #4DA5A3, #5B3A99);
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease;
}

.chat-send:hover {
    transform: scale(1.05);
}

.chat-send svg {
    width: 20px;
    height: 20px;
    fill: white;
}

.typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: white;
    border-radius: 18px;
    width: fit-content;
    border-bottom-left-radius: 4px;
}

.typing span {
    width: 8px;
    height: 8px;
    background: #999;
    border-radius: 50%;
    animation: typing 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-10px); opacity: 1; }
}
</style>

<!-- Chat Widget HTML -->
<div class="chat-widget">
    <button class="chat-button" id="chatButton">
        <svg viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z"/>
        </svg>
    </button>
    
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <h4>Pascal Medical <small>помощник</small></h4>
            <button class="chat-close" id="chatClose">×</button>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <strong>👋 Здравствуйте!</strong><br>
                Я виртуальный ассистент PascAL Medical. Задайте мне вопрос, и я постараюсь помочь!
            </div>
        </div>
        
        <div class="quick-questions" id="quickQuestions">
            <button class="quick-btn" data-question="Какие у вас шприцы?">Какие у вас шприцы?</button>
            <button class="quick-btn" data-question="Где купить продукцию?">Где купить?</button>
            <button class="quick-btn" data-question="Есть ли доставка?">Доставка?</button>
            <button class="quick-btn" data-question="Нужны сертификаты">Сертификаты</button>
        </div>
        
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Напишите ваш вопрос...">
            <button class="chat-send" id="chatSend">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<!-- Chat Widget JS -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const chatButton = document.getElementById('chatButton');
    const chatWindow = document.getElementById('chatWindow');
    const chatClose = document.getElementById('chatClose');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const chatMessages = document.getElementById('chatMessages');
    const quickButtons = document.querySelectorAll('.quick-btn');
    
    let sessionId = localStorage.getItem('chat_session_id');
    if (!sessionId) {
        sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('chat_session_id', sessionId);
    }
    
    // Открыть/закрыть окно
    chatButton.addEventListener('click', () => {
        chatWindow.classList.toggle('open');
    });
    
    chatClose.addEventListener('click', () => {
        chatWindow.classList.remove('open');
    });
    
    // Отправка сообщения
    function sendMessage() {
        const message = chatInput.value.trim();
        if (!message) return;
        
        // Добавляем сообщение пользователя
        addMessage(message, 'user');
        chatInput.value = '';
        
        // Показываем индикатор печати
        showTypingIndicator();
        
        // Отправляем запрос
        fetch('/assistant/api/chat/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCsrfToken()
            },
            body: JSON.stringify({
                message: message,
                session_id: sessionId
            })
        })
        .then(response => response.json())
        .then(data => {
            removeTypingIndicator();
            if (data.status === 'success') {
                addMessage(data.answer, 'bot');
                
                // Добавляем предложения
                if (data.suggestions && data.suggestions.length > 0) {
                    addSuggestions(data.suggestions);
                }
            } else {
                addMessage('🙏 Извините, произошла ошибка. Пожалуйста, попробуйте позже или свяжитесь с нами по телефону.', 'bot');
            }
        })
        .catch(error => {
            removeTypingIndicator();
            addMessage('🙏 Извините, произошла ошибка. Пожалуйста, попробуйте позже.', 'bot');
        });
    }
    
    function addMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        messageDiv.innerHTML = text.replace(/\n/g, '<br>');
        chatMessages.appendChild(messageDiv);
        scrollToBottom();
    }
    
    function addSuggestions(suggestions) {
        const suggestionsDiv = document.createElement('div');
        suggestionsDiv.className = 'message bot';
        suggestionsDiv.innerHTML = '<strong>💡 Возможно, вас заинтересует:</strong><br>';
        
        suggestions.forEach(sug => {
            suggestionsDiv.innerHTML += `<button class="suggestion-btn" style="background:#f0f0f0; border:none; padding:6px 12px; border-radius:20px; margin:5px 5px 0 0; cursor:pointer; font-size:12px; color:#5B3A99;">${sug.question}</button>`;
        });
        
        chatMessages.appendChild(suggestionsDiv);
        
        // Добавляем обработчики для кнопок-предложений
        suggestionsDiv.querySelectorAll('.suggestion-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                chatInput.value = btn.textContent;
                sendMessage();
            });
        });
        
        scrollToBottom();
    }
    
    let typingIndicator = null;
    
    function showTypingIndicator() {
        typingIndicator = document.createElement('div');
        typingIndicator.className = 'typing';
        typingIndicator.innerHTML = '<span></span><span></span><span></span>';
        chatMessages.appendChild(typingIndicator);
        scrollToBottom();
    }
    
    function removeTypingIndicator() {
        if (typingIndicator) {
            typingIndicator.remove();
            typingIndicator = null;
        }
    }
    
    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    function getCsrfToken() {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, 10) === 'csrftoken=') {
                    cookieValue = decodeURIComponent(cookie.substring(10));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // Enter для отправки
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
    
    chatSend.addEventListener('click', sendMessage);
    
    // Быстрые вопросы
    quickButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            chatInput.value = btn.getAttribute('data-question');
            sendMessage();
        });
    });
});
</script>
